version: '3.8'

services:
  medical-expert-system:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical-expert-system
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
    volumes:
      - ./rules.json:/app/rules.json:ro
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: medical-expert-network
