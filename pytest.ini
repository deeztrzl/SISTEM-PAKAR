[pytest]
# Pytest configuration

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --cov=inference_engine
    --cov-branch
    --cov-report=html
    --cov-report=xml
    --cov-report=term-missing

# Markers
markers =
    slow: slow tests
    integration: integration tests
    smoke: smoke tests
    performance: performance tests

# Timeout
timeout = 60
